<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Dégradé de FOND DE L'ICÔNE -->
        <linearGradient id="iconBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#BF360C;stop-opacity:1" /> <!-- Deep Orange -->
            <stop offset="100%" style="stop-color:#3E000C;stop-opacity:1" /> <!-- Very Dark Red/Black -->
        </linearGradient>

        <!-- Dégradé de FOND DU BOUCLIER -->
        <linearGradient id="shieldFillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a148c;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00695c;stop-opacity:1" />
        </linearGradient>

        <!-- Dégradé de CONTOUR -->
        <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#bb86fc;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#03dac6;stop-opacity:1" />
        </linearGradient>

        <!-- Filtre d'ombre pour le logo interne -->
        <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
    </defs>
    
    <!-- FOND DE L'ICÔNE (Squircle) -->
    <rect x="0" y="0" width="200" height="200" rx="45" fill="url(#iconBackGrad)" />

    <!-- GROUPE LOGO -->
    <g transform="translate(30, 32) scale(0.7)" filter="url(#logoShadow)">
        
        <!-- Forme du bouclier -->
        <path d="M100 175C100 175 160 145 160 75V35L100 15L40 35V75C40 145 100 175 100 175Z" 
              fill="url(#shieldFillGrad)" 
              stroke="url(#strokeGrad)" 
              stroke-width="6" />
        
        <!-- Checkmark central -->
        <path d="M70 95L90 115L130 75" 
              stroke="#ffffff" 
              stroke-width="14" 
              stroke-linecap="round" 
              stroke-linejoin="round"
              filter="drop-shadow(0 2px 4px rgba(0,0,0,0.3))" />
        
        <!-- Chronomètre -->
        <circle cx="150" cy="40" r="22" 
                fill="#1a1a1a" 
                stroke="url(#strokeGrad)" 
                stroke-width="4"/>
        
        <!-- Aiguilles du chrono -->
        <path d="M150 28V40H158" 
              stroke="#ffffff" 
              stroke-width="3" 
              stroke-linecap="round"/>
    </g>
</svg>