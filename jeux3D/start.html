<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancer le Jeu</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('fond.png');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', sans-serif;
            color: white;
            overflow: hidden;
            image-rendering: pixelated;
        }

        .container {
            text-align: center;
        }

        .main-text {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .sub-text {
            font-size: 20px;
        }
    </style>
    <script>
        // Ajout d'un écouteur pour détecter la touche A
        document.addEventListener('keydown', function(event) {
            if (event.key === 'a' || event.key === 'A') {
                // Redirection vers LV1.html si la touche A est pressée
                window.location.href = 'LV1.html';
            }
        });



            trackVisit('jeux3d')

function trackVisit(pageName = "Accueil") {
    // 1. Générer ou récupérer un ID Appareil unique
    let deviceId = localStorage.getItem('app_device_id');
    if (!deviceId) {
        deviceId = 'dev-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
        localStorage.setItem('app_device_id', deviceId);
    }

    // 2. Envoyer les données
    fetch('/track.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            deviceId: deviceId,
            page: pageName
        })
    }).catch(e => console.log("Tracking error", e));
}


    </script>
</head>
<body>
    <div class="container">
        <div class="main-text">Press A</div>
        <div class="sub-text">pour lancer le jeu</div>
    </div>
</body>
</html>
