<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur de Pi Dynamique (Optimisé)</title>
    <style>
        body { 
            margin: 0; 
            background: #111; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Barre de contrôles */
        #controls { 
            background: #222; 
            padding: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            align-items: center; 
            border-bottom: 1px solid #444; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10; 
        }

        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
        }

        label { 
            font-size: 0.7rem; 
            color: #aaa; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] { 
            width: 100px; 
            cursor: pointer;
        }

        input[type="color"] {
            border: none;
            width: 25px;
            height: 25px;
            cursor: pointer;
            background: none;
        }

        button {
            background: #444;
            color: #eee;
            border: 1px solid #666;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        button:hover {
            background: #555;
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        /* Légende */
        #legend {
            display: flex;
            justify-content: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.65rem;
            width: 25px;
        }

        .color-box {
            width: 18px;
            height: 18px;
            border-radius: 2px;
            margin-bottom: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Zone de dessin */
        #canvas-container {
            flex-grow: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            padding: 10px;
            position: relative;
        }

        canvas { 
            image-rendering: pixelated; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background: #000;
            cursor: nwse-resize;
        }

        .stats { 
            font-size: 0.75em; 
            color: #888; 
            margin-left: auto;
            text-align: right;
            line-height: 1.4;
        }

        span.value-display {
            color: #4dabff;
            font-weight: bold;
            font-family: monospace;
        }

        #loading-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: none;
            border: 1px solid #555;
            color: #fff;
            z-index: 20;
        }

        .bg-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4dabff;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }
    </style>
</head>
<body>

<div id="controls">
    <div class="control-group">
        <label>Couleurs (0 → 9)</label>
        <div class="input-row">
            <input type="color" id="color0" value="#0055ff" title="Couleur pour 0">
            <input type="color" id="color9" value="#ffff00" title="Couleur pour 9">
        </div>
    </div>

    <div class="control-group">
        <label>Pixel: <span id="sizeVal" class="value-display">8</span>px</label>
        <input type="range" id="squareSize" min="1" max="50" value="8">
    </div>

    <div class="control-group">
        <label>W: <span id="widthVal" class="value-display">50</span></label>
        <input type="range" id="widthInput" min="5" max="1000" value="50">
    </div>

    <div class="control-group">
        <label>H: <span id="heightVal" class="value-display">50</span></label>
        <input type="range" id="heightInput" min="5" max="1000" value="50">
    </div>

    <div class="control-group">
        <label>Actions</label>
        <button id="resetCache">Vider le cache</button>
    </div>

    <div class="stats">
        Digits calculés : <span id="digitCount" style="color:white">0</span><br>
        <div id="bg-status" style="visibility: hidden;">
            <span class="bg-pulse"></span><small>Calcul en arrière-plan...</small>
        </div>
    </div>
</div>

<div id="legend"></div>

<div id="canvas-container">
    <canvas id="piCanvas"></canvas>
    <div id="loading-overlay">Initialisation... <span id="loadPercent">0</span>%</div>
</div>

<canvas id="bufferCanvas" style="display:none"></canvas>

<script>
/**
 * Logique de visualisation robuste de Pi
 */
const canvas = document.getElementById('piCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const bufferCanvas = document.getElementById('bufferCanvas');
const bufferCtx = bufferCanvas.getContext('2d', { alpha: false });

const wInput = document.getElementById('widthInput');
const hInput = document.getElementById('heightInput');
const sInput = document.getElementById('squareSize');
const c0Input = document.getElementById('color0');
const c9Input = document.getElementById('color9');
const resetBtn = document.getElementById('resetCache');

const wDisp = document.getElementById('widthVal');
const hDisp = document.getElementById('heightVal');
const sDisp = document.getElementById('sizeVal');
const counterDisplay = document.getElementById('digitCount');
const legendContainer = document.getElementById('legend');
const loadingOverlay = document.getElementById('loading-overlay');
const loadPercent = document.getElementById('loadPercent');
const bgStatus = document.getElementById('bg-status');

// État de l'application
const CACHE_KEY = 'pi_cache_v6';
let piDigits = localStorage.getItem(CACHE_KEY) || "3";
let isComputing = false;
let currentTarget = 0;
let saveTimeout = null;
const MAX_BACK_LIMIT = 1000000;

// Générateur de Pi (Algorithme de Spigot)
function* piGenerator() {
    let q = 1n, r = 0n, t = 1n, k = 1n, n = 3n, l = 3n;
    while (true) {
        if (4n * q + r - t < n * t) {
            yield Number(n);
            let nr = 10n * (r - n * t);
            n = ((10n * (3n * q + r)) / t) - 10n * n;
            q *= 10n;
            r = nr;
        } else {
            let nr = (2n * q + r) * l;
            let nn = (q * (7n * k + 2n) + r * l) / (t * l);
            q *= k;
            t *= l;
            l += 2n;
            k += 1n;
            n = nn;
            r = nr;
        }
    }
}

let gen = piGenerator();
let genIndex = 0;

/**
 * Synchronisation asynchrone pour éviter le freeze au démarrage
 */
async function asyncSyncGenerator() {
    if (genIndex >= piDigits.length) return;
    
    loadingOverlay.style.display = 'block';
    loadingOverlay.childNodes[0].textContent = "Synchronisation du cache... ";
    
    const CHUNK = 5000;
    while(genIndex < piDigits.length) {
        for(let i=0; i < CHUNK && genIndex < piDigits.length; i++) {
            gen.next();
            genIndex++;
        }
        loadPercent.innerText = Math.floor((genIndex / piDigits.length) * 100);
        // Laisser respirer le thread UI
        await new Promise(r => setTimeout(r, 0));
    }
    
    loadingOverlay.style.display = 'none';
    handleInputChange();
}

function debouncedSave() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        try {
            localStorage.setItem(CACHE_KEY, piDigits);
        } catch(e) {
            console.warn("LocalStorage plein");
        }
    }, 2000);
}

async function processPi() {
    if (isComputing) return;
    isComputing = true;
    
    while (piDigits.length < currentTarget || piDigits.length < MAX_BACK_LIMIT) {
        const isPriority = piDigits.length < currentTarget;
        
        if (isPriority) {
            loadingOverlay.style.display = 'block';
            loadingOverlay.childNodes[0].textContent = "Calcul de Pi... ";
            bgStatus.style.visibility = 'hidden';
        } else {
            loadingOverlay.style.display = 'none';
            bgStatus.style.visibility = 'visible';
        }
        
        let batch = "";
        const CHUNK = isPriority ? 1500 : 500; 
        
        for (let i = 0; i < CHUNK && (isPriority ? (piDigits.length + i < currentTarget) : (piDigits.length + i < MAX_BACK_LIMIT)); i++) {
            batch += gen.next().value.toString();
            genIndex++;
        }
        piDigits += batch;
        
        if (isPriority) {
            const progress = Math.min(100, Math.floor((piDigits.length / currentTarget) * 100));
            loadPercent.innerText = progress;
            requestAnimationFrame(drawCore);
        }
        counterDisplay.innerText = piDigits.length.toLocaleString();

        await new Promise(r => setTimeout(r, isPriority ? 0 : 200));
        
        if (!isPriority && piDigits.length % 5000 === 0) debouncedSave();
    }
    
    loadingOverlay.style.display = 'none';
    bgStatus.style.visibility = 'hidden';
    isComputing = false;
    debouncedSave();
}

let colorTable = [];
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
}

function updateColors() {
    colorTable = [];
    const c0 = hexToRgb(c0Input.value);
    const c9 = hexToRgb(c9Input.value);
    legendContainer.innerHTML = '';
    
    for (let i = 0; i <= 9; i++) {
        const f = i / 9;
        const r = Math.round(c0[0] + f * (c9[0] - c0[0]));
        const g = Math.round(c0[1] + f * (c9[1] - c0[1]));
        const b = Math.round(c0[2] + f * (c9[2] - c0[2]));
        colorTable.push([r, g, b]);
        
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="color-box" style="background: rgb(${r},${g},${b})"></div><span>${i}</span>`;
        legendContainer.appendChild(item);
    }
}

function drawCore() {
    const W = parseInt(wInput.value);
    const H = parseInt(hInput.value);
    const S = parseInt(sInput.value);
    const totalPixels = W * H;

    wDisp.innerText = W;
    hDisp.innerText = H;
    sDisp.innerText = S;

    bufferCanvas.width = W;
    bufferCanvas.height = H;
    const imgData = bufferCtx.createImageData(W, H);
    const data = imgData.data;

    for (let i = 0; i < totalPixels; i++) {
        const digitChar = piDigits[i];
        const idx = i * 4;
        
        if (digitChar !== undefined) {
            const color = colorTable[parseInt(digitChar)];
            data[idx]     = color[0];
            data[idx + 1] = color[1];
            data[idx + 2] = color[2];
            data[idx + 3] = 255;
        } else {
            data[idx] = data[idx+1] = data[idx+2] = 15;
            data[idx+3] = 255;
        }
    }

    bufferCtx.putImageData(imgData, 0, 0);

    canvas.width = W * S;
    canvas.height = H * S;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(bufferCanvas, 0, 0, W, H, 0, 0, W * S, H * S);
}

function handleInputChange() {
    updateColors();
    currentTarget = parseInt(wInput.value) * parseInt(hInput.value);
    requestAnimationFrame(drawCore);
    if (!isComputing) processPi();
}

// Events
[wInput, hInput, sInput, c0Input, c9Input].forEach(el => {
    el.addEventListener('input', handleInputChange);
});

resetBtn.addEventListener('click', () => {
    localStorage.removeItem(CACHE_KEY);
    piDigits = "3";
    gen = piGenerator();
    genIndex = 0;
    counterDisplay.innerText = "0";
    handleInputChange();
});

let isDragging = false;
canvas.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const rect = canvas.getBoundingClientRect();
    const S = parseInt(sInput.value);
    const newW = Math.max(5, Math.floor((e.clientX - rect.left) / S));
    const newH = Math.max(5, Math.floor((e.clientY - rect.top) / S));
    
    if (newW <= 1000 && newH <= 1000) {
        wInput.value = newW;
        hInput.value = newH;
        handleInputChange();
    }
});

// Initialisation sûre
asyncSyncGenerator();

</script>
</body>
</html>
